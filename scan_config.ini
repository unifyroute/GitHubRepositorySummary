# =============================================================================
# github_scan.py — Configuration File
# =============================================================================
# This file controls the default behaviour of github_scan.py.
# All settings here act as defaults and can be overridden at runtime by the
# corresponding CLI flags (e.g. --timeout, --pause, --output-dir).
#
# Format: standard INI file.  Keys are case-insensitive.
# Lines starting with '#' or ';' are comments and are ignored.
# =============================================================================


[scan]

# ---------------------------------------------------------------------------
# affiliation
# ---------------------------------------------------------------------------
# Controls which repositories are fetched for each authenticated user.
# The GitHub API accepts a comma-separated list of the following values:
#
#   owner              – Repositories directly owned by the authenticated user
#                        (personal repos).  This is the narrowest scope.
#
#   collaborator       – Repositories where the user has been added as an
#                        explicit collaborator (but is not the owner).
#
#   organization_member – Repositories belonging to any organisation the user
#                         is a member of, including private org repos that the
#                         user's membership grants access to.
#
# Combine multiple values with a comma (no spaces), e.g.:
#   affiliation = owner,organization_member
#   affiliation = owner,collaborator,organization_member
#
# Default: owner
# Tip: Set to "owner,organization_member" to also scan repos in your orgs.
# ---------------------------------------------------------------------------
affiliation = owner,organization_member


# ---------------------------------------------------------------------------
# timeout
# ---------------------------------------------------------------------------
# HTTP request timeout in seconds for each GitHub API call.
# Increase this on slow networks or for large repositories.
#
# Default: 30
# ---------------------------------------------------------------------------
timeout = 30


# ---------------------------------------------------------------------------
# pause
# ---------------------------------------------------------------------------
# Delay in seconds between scanning each account listed in the CSV file.
# Useful for staying within GitHub rate limits when scanning many accounts.
# Set to 0 to disable any pause between accounts.
#
# Accepts fractional seconds (e.g. 0.5).
# Default: 0.0
# ---------------------------------------------------------------------------
pause = 0.0


# ---------------------------------------------------------------------------
# output_dir
# ---------------------------------------------------------------------------
# Directory where generated output files will be written.
# The directory is created automatically if it does not exist.
# Relative paths are resolved from the working directory where the script
# is executed.
#
# Generated files:
#   repositories.json       – Full scan data in JSON format
#   repositories.csv        – Tabular data suitable for spreadsheets
#   repository-report.md    – Human-readable Markdown report per account
#   project-summaries.md    – Cross-account project summary table
#
# Default: output
# ---------------------------------------------------------------------------
output_dir = output


# ---------------------------------------------------------------------------
# input
# ---------------------------------------------------------------------------
# Path to the CSV file containing GitHub credentials.
# Each row must be in the format:  username,token
# Lines starting with '#' are treated as comments and skipped.
#
# The file may be plain-text CSV or an encrypted .enc file produced by the
# --encrypt-input flag.  If the file is encrypted, you must supply the
# decryption key via --decrypt-key at runtime.
#
# Default: key.csv
# ---------------------------------------------------------------------------
input = key.csv


# ---------------------------------------------------------------------------
# deduplicate
# ---------------------------------------------------------------------------
# Controls whether org / shared repositories are deduplicated across accounts
# in the cross-account output files (repositories.csv, repositories.json,
# project-summaries.md).
#
# When enabled (true):
#   - A repo that is accessible by multiple accounts (e.g. an org repo like
#     TradeHub101/TraderArch visible to both 'himshir' and 'SwAumDev') will
#     appear ONCE in the CSV/JSON/project-summaries outputs.
#   - A new 'members' column/field lists every account that had access to it,
#     e.g. "himshir, swaumdev".
#   - A new 'org_repo' boolean flag marks repos whose owner differs from the
#     scanning user (i.e. true org repos or forks owned by another account).
#   - The per-account section of repository-report.md is NOT deduplicated —
#     each account still shows its own full view of accessible repos.
#
# When disabled (false):
#   - Raw per-account output: every account's repos written as-is,
#     so org repos appear multiple times (once per member).
#
# CLI override: use --no-deduplicate to disable for a single run.
#
# Default: true
# ---------------------------------------------------------------------------
deduplicate = true

